<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mission Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <div id="background-container"></div>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="gradient-text">Mission Reports</h1>
            <p>Accessing all secured feedback submissions...</p>
        </div>

        <div class="table-container glass-card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Liked</th>
                        <th>Disliked</th>
                        <th>Message</th>
                        <th>Fun Q1</th>
                        <th>Fun Q2</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="7" class="loading">Establishing secure connection to Firebase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
